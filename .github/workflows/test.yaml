name: test

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - run: make build
      - run: make check
      - run: make lint
      - run: make test
